<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IQRA Academy – Admin Login</title>
  <meta name="description" content="IQRA Academy Student Management System – Secure Admin Login Portal" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="login-page" id="loginBody">

  <!-- Animated particles -->
  <div class="login-particles" id="loginParticles"></div>

  <div class="login-container">
    <div class="login-card">

      <!-- Logo / Branding -->
      <div class="login-logo">
        <div class="login-logo-icon">
          <i class="fas fa-graduation-cap"></i>
        </div>
        <h1>IQRA Academy</h1>
        <p>Learn • Grow • Succeed</p>
      </div>

      <p style="text-align:center; color:rgba(255,255,255,0.5); font-size:0.82rem; margin-bottom:1.5rem;">
        Sign in to access the Management System
      </p>

      <!-- Login Form -->
      <form id="loginForm" autocomplete="off" novalidate>

        <div class="login-form-group">
          <label for="username"><i class="fas fa-user" style="margin-right:5px; opacity:.6;"></i> Username</label>
          <div class="login-input-wrapper">
            <i class="fas fa-user input-icon"></i>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Enter username"
              autocomplete="username"
              required
            />
          </div>
        </div>

        <div class="login-form-group">
          <label for="password"><i class="fas fa-lock" style="margin-right:5px; opacity:.6;"></i> Password</label>
          <div class="login-input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter password"
              autocomplete="current-password"
              required
            />
            <button type="button" class="login-toggle-pwd" id="togglePassword" aria-label="Toggle password visibility">
              <i class="fas fa-eye-slash"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>

        <div class="login-error" id="loginError"></div>
      </form>

      <!-- Hint -->
      <div class="login-hint">
        <i class="fas fa-shield-alt" style="margin-right:5px;"></i>
        Demo: <strong style="color:rgba(255,255,255,0.7);">admin</strong> /
        <strong style="color:rgba(255,255,255,0.7);">admin123</strong>
      </div>
    </div>

    <!-- Footer text -->
    <p style="text-align:center; color:rgba(255,255,255,0.25); font-size:0.72rem; margin-top:1.25rem;">
      © 2025 IQRA Academy · All Rights Reserved
    </p>
  </div>

  <script src="js/seed.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', initLoginPage);
  </script>
</body>
</html>
